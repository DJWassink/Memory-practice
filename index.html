<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find It! - Hidden Object Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- MAIN MENU -->
  <div id="menu-screen" class="screen active">
    <div class="menu-container">
      <h1 class="game-title">Find It!</h1>
      <p class="subtitle">Select a level to start searching</p>
      <div id="level-grid" class="level-grid"></div>
      <a href="editor.html" class="editor-link">Open Bounding Box Editor</a>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <button id="back-btn" class="btn btn-back">&larr; Back</button>
      <h2 id="level-title" class="level-title"></h2>
      <div id="score-display" class="score-display">Found: <span id="score">0</span></div>
    </div>

    <div class="game-area">
      <div id="image-container" class="image-container">
        <img id="game-image" src="" alt="Level image">
        <div id="highlights-layer" class="highlights-layer"></div>
        <div id="click-feedback" class="click-feedback hidden"></div>
      </div>

      <div id="items-bar" class="items-bar">
        <p class="items-label">Find these items:</p>
        <div id="items-list" class="items-list"></div>
      </div>
    </div>

    <div id="round-complete" class="round-complete hidden">
      <div class="round-complete-inner">
        <h3>Round Complete!</h3>
        <p>You found all 3 items!</p>
        <button id="next-round-btn" class="btn btn-primary">Next Round</button>
      </div>
    </div>

    <div id="level-complete" class="level-complete hidden">
      <div class="level-complete-inner">
        <h3>Level Complete!</h3>
        <p>You found every item in this scene!</p>
        <button id="back-to-menu-btn" class="btn btn-primary">Back to Menu</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
