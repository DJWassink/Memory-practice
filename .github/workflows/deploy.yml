name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject commit hash
        run: |
          HASH=$(git rev-parse --short HEAD)
          # Expose commit hash in the UI
          sed -i "s/__COMMIT_HASH__/${HASH}/g" index.html
          # Cache-bust CSS and JS assets in all HTML files
          sed -i \
            -e "s/styles\.css\"/styles.css?v=${HASH}\"/g" \
            -e "s/custom-levels\.js\"/custom-levels.js?v=${HASH}\"/g" \
            -e "s/game\.js\"/game.js?v=${HASH}\"/g" \
            index.html editor.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
